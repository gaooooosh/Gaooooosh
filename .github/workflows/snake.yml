# GitHub 贡献图贪吃蛇动画生成器
# 在 GitHub 贡献图上生成贪吃蛇动画

name: Generate Snake Animation

on:
  # 每天 UTC 时间 0:00 自动运行
  schedule:
    - cron: "0 0 * * *"

  # 允许手动触发
  workflow_dispatch:

  # 推送到 main 分支时触发
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 生成贪吃蛇动画 SVG
      - name: 生成贪吃蛇动画
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif?color-scheme=github-dark
          # 配置颜色方案（黑白极简风格）
          color-snake: "#000000"
          color-dots: "#1a1a1a,#0d0d0d,#e6e6e6,#cccccc"

      # 将生成的文件推送到 output 分支
      - name: 推送到 output 分支
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
